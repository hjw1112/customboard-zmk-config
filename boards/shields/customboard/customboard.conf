# Uncomment the following line to turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y



CONFIG_ZMK_KEYBOARD_NAME="customboard"


#Bat
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY=y

#BT
CONFIG_BT=y
CONFIG_BT_BAS=y
CONFIG_ZMK_BLE=y

CONFIG_BT_OBSERVER=y
CONFIG_BT_CENTRAL=y

CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=n
CONFIG_BT_DEVICE_NAME="customboard"

#BT power savings
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_PM_DEVICE_RUNTIME=y

CONFIG_PM_DEVICE=y
CONFIG_BT_DIS=y
CONFIG_BT_SMP=y

CONFIG_BT_PERIPHERAL_PREF_MIN_INT=36
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=56
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

CONFIG_BT_GAP_SCAN_FAST_INTERVAL=160




#sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

#display
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
# CONFIG_SSD1306=y


CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y



CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
#CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y



#Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
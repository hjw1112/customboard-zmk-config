# description: TCA9555 GPIO Expander

# compatible: "ti,tca9555"

# include: [i2c-device.yaml, gpio-controller.yaml]

# properties:

#   ngpios:
#     type: int
#     required: true
#     description: Number of GPIOs (typically 16 for TCA9555)

#   int-gpios:
#     type: phandle-array
#     required: false
#     description: Optional interrupt pin from the expander



description: TCA9555 GPIO Expander

compatible: "ti,tca9555"

include: base.yaml

properties:
  "#gpio-cells":
    type: int
    const: 2

  gpio-controller:
    type: boolean

  int-gpios:
    type: phandle-array
    required: false
  
  ngpios:
    type: int
    required: true
    description: no.of gpios




    tca9555: tca9555@20 {
        compatible = "ti,tca9555";
        reg = <0x20>;
        gpio-controller;
        #gpio-cells = <2>;
        ngpios = <16>;
        int-gpios = <&gpio0 11 GPIO_ACTIVE_LOW>;
    };
